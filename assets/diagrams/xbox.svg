<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" fill="none">
  <defs>
    <linearGradient id="bodyFill" x1="500" y1="104" x2="500" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDF3FB"/>
